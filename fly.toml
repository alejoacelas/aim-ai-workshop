app = 'useai-help'
primary_region = 'iad'

[build]

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '256'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256

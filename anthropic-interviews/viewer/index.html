<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnthropicInterviewer analysis</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #fafafa;
    --panel-bg: #fff;
    --border: #e0e0e0;
    --text: #1a1a1a;
    --text-muted: #666;
    --accent: #5a4fcf;
    --accent-light: #ededff;
    --mark-bg: #fff3a8;
    --mark-border: #e6c200;
    --tab-active: #5a4fcf;
    --tab-inactive: #888;
    --user-bg: #f0f4ff;
    --assistant-bg: #f8f8f8;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Tab bar */
  .tab-bar {
    display: flex;
    gap: 0;
    background: var(--panel-bg);
    border-bottom: 1px solid var(--border);
    padding: 0 1rem;
    flex-shrink: 0;
  }
  .tab-bar button {
    padding: 0.75rem 1.25rem;
    border: none;
    background: none;
    cursor: pointer;
    font-size: 0.9rem;
    font-weight: 500;
    color: var(--tab-inactive);
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }
  .tab-bar button:hover { color: var(--text); }
  .tab-bar button.active {
    color: var(--tab-active);
    border-bottom-color: var(--tab-active);
  }

  /* Main layout */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* Report panel */
  .report-panel {
    flex: 0 0 60%;
    overflow-y: auto;
    padding: 2rem 2.5rem;
    border-right: 1px solid var(--border);
    background: var(--panel-bg);
  }
  .report-panel h1 { font-size: 1.6rem; margin-bottom: 1rem; }
  .report-panel h2 { font-size: 1.3rem; margin-top: 2rem; margin-bottom: 0.75rem; border-bottom: 1px solid var(--border); padding-bottom: 0.4rem; }
  .report-panel h3 { font-size: 1.1rem; margin-top: 1.5rem; margin-bottom: 0.5rem; }
  .report-panel p { margin-bottom: 0.75rem; }
  .report-panel ul, .report-panel ol { margin-bottom: 0.75rem; padding-left: 1.5rem; }
  .report-panel li { margin-bottom: 0.3rem; }
  .report-panel blockquote {
    border-left: 3px solid var(--accent);
    padding: 0.5rem 1rem;
    margin: 0.75rem 0;
    background: var(--accent-light);
    border-radius: 0 4px 4px 0;
  }
  .report-panel blockquote p { margin-bottom: 0.25rem; }

  /* Clickable quote attribution */
  .quote-link {
    color: var(--accent);
    cursor: pointer;
    text-decoration: underline;
    text-decoration-style: dotted;
    font-weight: 500;
  }
  .quote-link:hover {
    text-decoration-style: solid;
  }

  /* Transcript panel */
  .transcript-panel {
    flex: 0 0 40%;
    overflow-y: auto;
    padding: 1.5rem;
    background: var(--bg);
    display: flex;
    flex-direction: column;
  }
  .transcript-header {
    font-size: 0.85rem;
    color: var(--text-muted);
    margin-bottom: 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .transcript-header strong { color: var(--text); }
  .transcript-placeholder {
    display: flex;
    align-items: center;
    justify-content: center;
    flex: 1;
    color: var(--text-muted);
    font-size: 0.95rem;
  }
  .transcript-content {
    flex: 1;
    overflow-y: auto;
    font-size: 0.88rem;
    line-height: 1.7;
  }
  .transcript-content .turn {
    padding: 0.6rem 0.8rem;
    margin-bottom: 0.25rem;
    border-radius: 4px;
  }
  .transcript-content .turn-user { background: var(--user-bg); }
  .transcript-content .turn-assistant { background: var(--assistant-bg); }
  .transcript-content .turn-label {
    font-weight: 600;
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    margin-bottom: 0.2rem;
    color: var(--text-muted);
  }
  .transcript-content mark {
    background: var(--mark-bg);
    border-bottom: 2px solid var(--mark-border);
    padding: 0.1em 0;
    scroll-margin-top: 100px;
  }

  /* Loading state */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-muted);
  }

  /* Responsive */
  @media (max-width: 900px) {
    .main { flex-direction: column; }
    .report-panel { flex: none; height: 55vh; border-right: none; border-bottom: 1px solid var(--border); }
    .transcript-panel { flex: none; height: 45vh; }
  }
</style>
</head>
<body>

<div class="tab-bar" id="tabBar"></div>
<div class="main">
  <div class="report-panel" id="reportPanel">
    <div class="loading">Loading reports...</div>
  </div>
  <div class="transcript-panel" id="transcriptPanel">
    <div class="transcript-placeholder">Click a quote attribution to view transcript context</div>
  </div>
</div>

<script>
const REPORTS = [
  { key: 'coding', title: 'Coding agents for non-programmers', file: '../reports/coding-agents-for-nonprogrammers.md' },
  { key: 'time', title: 'Time-saving patterns', file: '../reports/time-saving-patterns.md' },
  { key: 'delegation', title: 'Delegation vs. collaboration', file: '../reports/delegation-vs-collaboration.md' },
];

let transcripts = {};
let quotes = [];
let reportContents = {};
let currentReport = REPORTS[0].key;

// Parse transcript into turns
function parseTranscript(text) {
  // Split on turn markers (User:, Assistant:, AI:, Human:, Interviewee:, Interviewer:)
  const turnRegex = /^(User|Assistant|AI|Human|Interviewee|Interviewer):\s*/gm;
  const parts = [];
  let lastIndex = 0;
  let lastRole = null;
  let match;

  const allMatches = [];
  while ((match = turnRegex.exec(text)) !== null) {
    allMatches.push({ index: match.index, role: match[1], fullMatch: match[0] });
  }

  if (allMatches.length === 0) {
    return [{ role: 'transcript', text: text }];
  }

  // Text before first turn marker
  if (allMatches[0].index > 0) {
    const pre = text.slice(0, allMatches[0].index).trim();
    if (pre) parts.push({ role: 'transcript', text: pre });
  }

  for (let i = 0; i < allMatches.length; i++) {
    const start = allMatches[i].index + allMatches[i].fullMatch.length;
    const end = i + 1 < allMatches.length ? allMatches[i + 1].index : text.length;
    const turnText = text.slice(start, end).trim();
    const role = allMatches[i].role;
    const roleClass = (role === 'User' || role === 'Human' || role === 'Interviewee') ? 'user' : 'assistant';
    parts.push({ role: roleClass, label: role, text: turnText, startOffset: start, endOffset: end });
  }
  return parts;
}

// Render transcript with optional highlight
function renderTranscript(id, highlightStart, highlightEnd) {
  const panel = document.getElementById('transcriptPanel');
  const text = transcripts[id];
  if (!text) {
    panel.innerHTML = `<div class="transcript-placeholder">Transcript "${id}" not found</div>`;
    return;
  }

  let html = `<div class="transcript-header"><strong>${id}</strong></div>`;
  html += '<div class="transcript-content" id="transcriptContent">';

  if (highlightStart !== undefined && highlightEnd !== undefined) {
    // Render with highlight using raw text approach
    const before = text.slice(0, highlightStart);
    const highlighted = text.slice(highlightStart, highlightEnd);
    const after = text.slice(highlightEnd);
    const full = before + '<mark id="quoteHighlight">' + escapeHtml(highlighted) + '</mark>' + after;

    // Parse turns from the combined text (with mark tags preserved)
    // Simpler approach: render raw with turn styling via regex replacement
    const styledText = full
      .replace(/^(User|Human|Interviewee):\s*/gm, '</div><div class="turn turn-user"><div class="turn-label">$1</div>')
      .replace(/^(Assistant|AI|Interviewer):\s*/gm, '</div><div class="turn turn-assistant"><div class="turn-label">$1</div>');

    html += '<div class="turn">' + styledText + '</div>';
  } else {
    const turns = parseTranscript(text);
    for (const turn of turns) {
      const cls = turn.role === 'user' ? 'turn-user' : turn.role === 'assistant' ? 'turn-assistant' : '';
      html += `<div class="turn ${cls}">`;
      if (turn.label) html += `<div class="turn-label">${turn.label}</div>`;
      html += escapeHtml(turn.text).replace(/\n/g, '<br>');
      html += '</div>';
    }
  }
  html += '</div>';
  panel.innerHTML = html;

  // Scroll to highlight
  requestAnimationFrame(() => {
    const mark = document.getElementById('quoteHighlight');
    if (mark) mark.scrollIntoView({ behavior: 'smooth', block: 'center' });
  });
}

function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// Make transcript IDs clickable everywhere
function processReportHtml(html, reportKey) {
  // Match any transcript ID reference: both quote attributions (— work_0123)
  // and inline mentions like (work_0123) or just work_0123
  return html.replace(/((?:—|[-–]{2,3})\s*)?(work_\d+|crea_\d+|sci_\d+)/g, (match, prefix, id) => {
    return (prefix || '') + `<span class="quote-link" data-report="${reportKey}" data-id="${id}">${id}</span>`;
  });
}

// Render current report
function renderReport() {
  const panel = document.getElementById('reportPanel');
  const md = reportContents[currentReport];
  if (!md) {
    panel.innerHTML = '<div class="loading">Report not yet available</div>';
    return;
  }
  let html = marked.parse(md);
  html = processReportHtml(html, currentReport);
  panel.innerHTML = html;

  // Attach click handlers to quote links
  panel.querySelectorAll('.quote-link').forEach(el => {
    el.addEventListener('click', () => {
      const id = el.dataset.id;
      const reportKey = el.dataset.report;

      // Find quote context from quotes.json
      // Get the blockquote text - walk up to find the blockquote
      const blockquote = el.closest('blockquote');
      let quoteText = '';
      if (blockquote) {
        const ps = blockquote.querySelectorAll('p');
        if (ps.length > 0) {
          // First p usually has the quote text
          quoteText = ps[0].textContent.replace(/^"|"$/g, '').trim();
        }
      }

      // Look up in quotes.json
      const quoteEntry = quotes.find(q =>
        q.transcript_id === id && q.report === reportKey
      ) || quotes.find(q =>
        q.transcript_id === id
      );

      if (quoteEntry) {
        renderTranscript(id, quoteEntry.start, quoteEntry.end);
      } else {
        // Fallback: try to find quote in transcript by text match
        const transcript = transcripts[id];
        if (transcript && quoteText) {
          const idx = transcript.indexOf(quoteText.slice(0, 80));
          if (idx !== -1) {
            renderTranscript(id, idx, idx + quoteText.length);
            return;
          }
        }
        renderTranscript(id);
      }
    });
  });
}

// Tab switching
function renderTabs() {
  const bar = document.getElementById('tabBar');
  bar.innerHTML = '';
  for (const r of REPORTS) {
    const btn = document.createElement('button');
    btn.textContent = r.title;
    btn.className = r.key === currentReport ? 'active' : '';
    btn.addEventListener('click', () => {
      currentReport = r.key;
      renderTabs();
      renderReport();
    });
    bar.appendChild(btn);
  }
}

// Load everything
async function init() {
  renderTabs();

  const [transcriptData, quotesData, ...reportTexts] = await Promise.all([
    fetch('transcripts.json').then(r => r.json()).catch(() => ({})),
    fetch('quotes.json').then(r => r.json()).catch(() => []),
    ...REPORTS.map(r => fetch(r.file).then(res => res.text()).catch(() => ''))
  ]);

  transcripts = transcriptData;
  quotes = quotesData;

  REPORTS.forEach((r, i) => {
    reportContents[r.key] = reportTexts[i];
  });

  renderReport();
}

init();
</script>
</body>
</html>

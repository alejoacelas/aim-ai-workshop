name: Test helpme

on:
  push:
    paths:
      - "helpme/**"
      - ".github/workflows/test-helpme.yml"
  pull_request:
    paths:
      - "helpme/**"
      - ".github/workflows/test-helpme.yml"

jobs:
  bash-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - run: bash helpme/tests/test_helpme.sh

  powershell-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Debug - test helpme.ps1 invocation variants
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          $env:HELPME_WORKER_URL = "http://localhost:0"
          $env:HELPME_LOG_DIR = "$([System.IO.Path]::GetTempPath())helpme-debug"
          New-Item -ItemType Directory -Path $env:HELPME_LOG_DIR -Force | Out-Null
          $h = "helpme/helpme.ps1"

          # Variant 1: no --, bare call
          $Error.Clear()
          $out = & pwsh -File $h echo hello 2>&1
          Write-Host "V1 (no --):       exit=$LASTEXITCODE output=$($out -join '|') errors=$($Error.Count)"

          # Variant 2: with --
          $Error.Clear()
          $out = & pwsh -File $h -- echo hello 2>&1
          Write-Host "V2 (with --):     exit=$LASTEXITCODE output=$($out -join '|') errors=$($Error.Count)"

          # Variant 3: with -- piped to Out-Null (how the test does it)
          $Error.Clear()
          & pwsh -File $h -- echo hello 2>&1 | Out-Null
          Write-Host "V3 (pipe null):   exit=$LASTEXITCODE errors=$($Error.Count)"

          # Variant 4: scriptblock + 2>&1 + Out-Null (exact test pattern)
          $Error.Clear()
          $sb = { pwsh -File $h -- echo hello }
          try { & $sb 2>&1 | Out-Null; $e = $LASTEXITCODE } catch { $e = "CAUGHT" }
          Write-Host "V4 (scriptblock): exit=$e errors=$($Error.Count)"
          $Error | ForEach-Object { Write-Host "  ERR: $_" }

          # Variant 5: scriptblock without Out-Null
          $Error.Clear()
          try { & { pwsh -File $h -- echo hello } 2>&1 | Out-String | Out-Null; $e = $LASTEXITCODE } catch { $e = "CAUGHT" }
          Write-Host "V5 (Out-String):  exit=$e errors=$($Error.Count)"
        continue-on-error: true
      - run: pwsh helpme/tests/test_helpme.ps1

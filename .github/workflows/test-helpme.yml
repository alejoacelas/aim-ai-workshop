name: Test helpme

on:
  push:
    paths:
      - "helpme/**"
      - ".github/workflows/test-helpme.yml"
  pull_request:
    paths:
      - "helpme/**"
      - ".github/workflows/test-helpme.yml"

jobs:
  bash-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - run: bash helpme/tests/test_helpme.sh

  powershell-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Debug - test helpme.ps1 directly
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          $env:HELPME_WORKER_URL = "http://localhost:0"
          $env:HELPME_LOG_DIR = "$([System.IO.Path]::GetTempPath())helpme-debug"
          New-Item -ItemType Directory -Path $env:HELPME_LOG_DIR -Force | Out-Null
          Write-Host "LOG_DIR: $env:HELPME_LOG_DIR"
          Write-Host "--- Running: pwsh -File helpme/helpme.ps1 echo hello ---"
          $allOutput = & pwsh -File helpme/helpme.ps1 echo hello 2>&1
          Write-Host "LASTEXITCODE: $LASTEXITCODE"
          Write-Host "ALL OUTPUT:"
          $allOutput | ForEach-Object { Write-Host "  [$($_.GetType().Name)] $_" }
          Write-Host "ERROR STREAM ($($Error.Count) entries):"
          $Error | ForEach-Object { Write-Host "  ERR: $_" }
          $logPath = Join-Path $env:HELPME_LOG_DIR "log.jsonl"
          if (Test-Path $logPath) { Write-Host "LOG:"; Get-Content $logPath } else { Write-Host "NO LOG FILE at $logPath" }
        continue-on-error: true
      - run: pwsh helpme/tests/test_helpme.ps1

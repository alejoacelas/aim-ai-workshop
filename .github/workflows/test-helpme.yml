name: Test helpme CLI

on:
  push:
    paths:
      - "helpme/**"
      - ".github/workflows/test-helpme.yml"
  pull_request:
    paths:
      - "helpme/**"
      - ".github/workflows/test-helpme.yml"

jobs:
  bash-tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-22.04, macos-latest, macos-13]
    steps:
      - uses: actions/checkout@v4
      - run: bash helpme/tests/test_helpme.sh

  bash-install-tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-22.04, macos-latest, macos-13]
    steps:
      - uses: actions/checkout@v4
      - run: bash helpme/tests/test_install.sh

  integration-tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-22.04, macos-latest, macos-13]
    steps:
      - uses: actions/checkout@v4
      - run: bash helpme/tests/test_integration.sh

  powershell-tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-22.04, macos-latest, macos-13, windows-latest, windows-2022]
    steps:
      - uses: actions/checkout@v4
      - run: pwsh helpme/tests/test_helpme.ps1

  powershell-install-tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-22.04, macos-latest, macos-13, windows-latest, windows-2022]
    steps:
      - uses: actions/checkout@v4
      - run: pwsh helpme/tests/test_install.ps1

  powershell-51-tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, windows-2022]
    steps:
      - uses: actions/checkout@v4
      - run: powershell -Command "& 'helpme/tests/test_helpme.ps1'"

  bash-tests-windows:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, windows-2022]
    steps:
      - uses: actions/checkout@v4
      - run: bash helpme/tests/test_helpme.sh
